naftiko: 1.0.0-alpha2
info:
  label: Cyclr API — LAUNCH
  description: 'Cyclr API — LAUNCH. 1 operations. Lead operation: Cyclr Deploy LAUNCH. Self-contained Naftiko capability covering
    one Cyclr business surface.'
  tags:
  - Cyclr
  - LAUNCH
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CYCLR_API_KEY: CYCLR_API_KEY
capability:
  consumes:
  - type: http
    namespace: cyclr-launch
    baseUri: https://api.cyclr.com/v1.0
    description: Cyclr API — LAUNCH business capability. Self-contained, no shared references.
    resources:
    - name: users-launch
      path: /users/launch
      operations:
      - name: deploylaunch
        method: POST
        description: Cyclr Deploy LAUNCH
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CYCLR_API_KEY}}'
  exposes:
  - type: rest
    namespace: cyclr-launch-rest
    port: 8080
    description: REST adapter for Cyclr API — LAUNCH. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users/launch
      name: users-launch
      description: REST surface for users-launch.
      operations:
      - method: POST
        name: deploylaunch
        description: Cyclr Deploy LAUNCH
        call: cyclr-launch.deploylaunch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cyclr-launch-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cyclr API — LAUNCH. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: cyclr-deploy-launch
      description: Cyclr Deploy LAUNCH
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cyclr-launch.deploylaunch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
