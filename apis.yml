aid: cyclr
name: Cyclr
kind: company
description: >-
  Cyclr is an embedded iPaaS (integration platform as a service) used by SaaS vendors to deliver native integrations to
  their customers without each vendor building and maintaining one-off connectors. The platform provides a connector
  library covering hundreds of business applications (CRM, marketing, finance, support, ERP, e-commerce), drag-and-drop
  integration templates, embedded LAUNCH and Marketplace UIs, custom connector creation, fully managed authentication,
  and workflow orchestration. Cyclr exposes a public REST API at api.cyclr.com (with regional EU / AU / UK / US2
  siblings) protected by OAuth 2.0 client credentials. Account-scoped calls require an X-Cyclr-Account header to
  identify the target Cyclr account.
