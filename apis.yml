apis:
  - aid: cyclr:api
    name: Cyclr API
    description: >-
      Cyclr's REST API allows partners to manage their accounts, install
      and authenticate connectors, install templates as cycles, build
      and configure cycle steps, and embed LAUNCH and Marketplace UIs
      into their host SaaS product. Authentication uses OAuth 2.0
      client credentials issued in the Cyclr Console; account-scoped
      operations include the X-Cyclr-Account HTTP header.
